name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm install

      - name: Type check
        run: npx tsc --noEmit

      - name: Build CLI
        run: node scripts/build-cli.mjs

      - name: Publish to npm
        run: |
          VER=$(node -p "require('./package.json').version")
          npm view "@openduo/duoduo-widgets@$VER" version &>/dev/null && \
            echo "SKIP: @openduo/duoduo-widgets@$VER already published" || \
            npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  create-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: publish-npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release view "$TAG" &>/dev/null && \
            echo "SKIP: release $TAG already exists" || \
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes
